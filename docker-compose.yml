services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    init: true
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      NODE_ENV: production
      ALLOWED_ORIGIN: ${ALLOWED_ORIGIN:-}
      TURN_URL: ${TURN_URL:-}
      TURN_SECRET: ${TURN_SECRET:-}
      TURN_USERNAME: ${TURN_USERNAME:-}
      TURN_CREDENTIAL: ${TURN_CREDENTIAL:-}
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "1m"
        max-file: "1"

  # Optional self-hosted TURN relay for clients behind carrier-grade NAT.
  # Disabled by default. Start with: docker compose --profile turn up
  coturn:
    image: coturn/coturn:alpine
    profiles: ["turn"]
    environment:
      # Not required here at compose-parse time (would break `docker compose
      # up` for the default `app`-only path even when the turn profile isn't
      # used) — render-config.sh enforces this at container start instead,
      # which only happens when this profile is actually invoked.
      TURN_SECRET: ${TURN_SECRET:-}
      TURN_REALM: ${TURN_REALM:-turn.local}
    entrypoint: ["/bin/sh", "/render-config.sh"]
    volumes:
      - ./coturn/turnserver.conf.template:/etc/coturn/turnserver.conf.template:ro
      - ./coturn/render-config.sh:/render-config.sh:ro
    ports:
      - "3478:3478/udp"
      - "3478:3478/tcp"
      - "49152-49200:49152-49200/udp"
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "1m"
        max-file: "1"
