services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      NODE_ENV: production
      ALLOWED_ORIGIN: ${ALLOWED_ORIGIN:-}
      TURN_URL: ${TURN_URL:-}
      TURN_SECRET: ${TURN_SECRET:-}
      TURN_USERNAME: ${TURN_USERNAME:-}
      TURN_CREDENTIAL: ${TURN_CREDENTIAL:-}
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "1m"
        max-file: "1"

  # Optional self-hosted TURN relay for clients behind carrier-grade NAT.
  # Disabled by default. Start with: docker compose --profile turn up
  coturn:
    image: coturn/coturn:alpine
    profiles: ["turn"]
    volumes:
      - ./coturn/turnserver.conf.example:/etc/coturn/turnserver.conf:ro
    ports:
      - "3478:3478/udp"
      - "3478:3478/tcp"
      - "49152-49200:49152-49200/udp"
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "1m"
        max-file: "1"
